services:
  app:
    image: horizon2333/prototype-manage-tool:${IMAGE_TAG:-latest}
    container_name: prototype-preview-app
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      DATA_DIR: /app/data
      DATABASE_URL: file:/app/data/sqlite/app.db
      APP_URL: ${APP_URL:-http://localhost}
      UPLOAD_MAX_MB: ${UPLOAD_MAX_MB:-200}
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - ./docker-data:/app/data
    restart: unless-stopped

  db-init:
    image: horizon2333/prototype-manage-tool:${IMAGE_TAG:-latest}
    profiles: ["init"]
    environment:
      NODE_ENV: production
      DATA_DIR: /app/data
      DATABASE_URL: file:/app/data/sqlite/app.db
      APP_URL: ${APP_URL:-http://localhost}
      UPLOAD_MAX_MB: ${UPLOAD_MAX_MB:-200}
    volumes:
      - ./docker-data:/app/data
    command: sh -c "pnpm prisma:generate && pnpm db:push"

  seed-demo:
    image: horizon2333/prototype-manage-tool:${IMAGE_TAG:-latest}
    profiles: ["seed"]
    environment:
      NODE_ENV: production
      DATA_DIR: /app/data
      DATABASE_URL: file:/app/data/sqlite/app.db
      APP_URL: ${APP_URL:-http://localhost}
      UPLOAD_MAX_MB: ${UPLOAD_MAX_MB:-200}
    volumes:
      - ./docker-data:/app/data
    command: sh -c "pnpm prisma:generate && pnpm db:push && pnpm db:seed"
